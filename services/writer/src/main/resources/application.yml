server:
  port: ${WRITER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: cache-writer
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:catalog}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:app}
    password: ${MYSQL_PASSWORD:app}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 16
      minimum-idle: 2
      connection-timeout: 5000
  jackson:
    property-naming-strategy: SNAKE_CASE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  level:
    root: INFO
    io.github.lamthao1995: INFO
    org.springframework.jdbc.core: WARN
