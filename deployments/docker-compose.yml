# Single-host stack mirroring the k8s manifests in deployments/k8s/. Use this for fast
# local iteration / stress measurement; use the k8s manifests for any deploy that needs
# resilience, autoscaling, or a real ingress.

services:
  # ─── Storage layer ───────────────────────────────────────────────
  mysql:
    # MySQL 8.0 (not 8.4): Debezium 2.7.x still issues `SHOW MASTER STATUS`, which 8.4
    # removed in favour of `SHOW BINARY LOG STATUS`. Until Debezium 3.0.0.Final (or a
    # 2.7.x patch) drops, 8.0 is the safe pairing.
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-catalog}
      MYSQL_USER:          ${MYSQL_USER:-app}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-app}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.4-alpine
    container_name: redis
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── CDC pipeline ────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    environment:
      # KRaft topology — broker + controller in the same pod (single-node dev cluster).
      KAFKA_NODE_ID:                          "1"
      KAFKA_PROCESS_ROLES:                    "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS:         "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES:        "CONTROLLER"
      CLUSTER_ID:                             "caching-infra-cluster-1"
      # Listeners
      KAFKA_LISTENERS:                        "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS:             "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME:       "PLAINTEXT"
      # Single-broker → replication 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:         "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:            "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR:               "1"
      KAFKA_MIN_INSYNC_REPLICAS:                      "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:                "true"
      KAFKA_NUM_PARTITIONS:                            "6"
      KAFKA_LOG_RETENTION_HOURS:                       "72"
      KAFKA_LOG_DIRS:                                  "/var/lib/kafka/data"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      # The apache/kafka image is based on Eclipse Temurin Linux. Bash is available, so we
      # use the cheap /dev/tcp probe — no JVM spawn per check.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  kafka-connect:
    image: quay.io/debezium/connect:2.7.3.Final
    container_name: kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS:                "kafka:9092"
      GROUP_ID:                         "connect-cluster"
      CONFIG_STORAGE_TOPIC:             "connect-configs"
      OFFSET_STORAGE_TOPIC:             "connect-offsets"
      STATUS_STORAGE_TOPIC:             "connect-status"
      CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      STATUS_STORAGE_REPLICATION_FACTOR: "1"
      KEY_CONVERTER:                    "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER:                  "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE:   "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"
    # No healthcheck: the Debezium image (UBI minimal) ships without curl/wget/bash, so
    # any in-container probe needs a JVM. The register-debezium service below polls the
    # REST API itself with curl from a separate container — that's our readiness signal.

  register-debezium:
    image: curlimages/curl:8.10.1
    container_name: register-debezium
    depends_on:
      kafka-connect:
        condition: service_started
    entrypoint: ["/bin/sh", "/scripts/register.sh"]
    environment:
      CONNECT_URL: "http://kafka-connect:8083"
    volumes:
      - ./connect/connector.json:/etc/connector/connector.json:ro
      - ./connect/register.sh:/scripts/register.sh:ro
    restart: "no"

  # ─── Application services ────────────────────────────────────────
  writer:
    image: cache-writer:0.1.0
    build:
      context: ..
      dockerfile: services/writer/Dockerfile
    container_name: writer
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WRITER_PORT:    "8080"
      MYSQL_HOST:     "mysql"
      MYSQL_PORT:     "3306"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-catalog}"
      MYSQL_USER:     "${MYSQL_USER:-app}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-app}"
    ports:
      - "${WRITER_HOST_PORT:-8080}:8080"
    healthcheck:
      # distroless :debug-nonroot ships busybox at /busybox/, not on PATH — invoke wget directly.
      test: ["CMD-SHELL", "/busybox/wget -qO- http://localhost:8080/actuator/health/readiness | /busybox/grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  reader:
    image: cache-reader:0.1.0
    build:
      context: ..
      dockerfile: services/reader/Dockerfile
    container_name: reader
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      READER_PORT:    "8081"
      MYSQL_HOST:     "mysql"
      MYSQL_PORT:     "3306"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-catalog}"
      MYSQL_USER:     "${MYSQL_USER:-app}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-app}"
      REDIS_HOST:     "redis"
      REDIS_PORT:     "6379"
      CACHE_TTL:      "${CACHE_TTL:-10m}"
    ports:
      - "${READER_HOST_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "/busybox/wget -qO- http://localhost:8081/actuator/health/readiness | /busybox/grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  invalidator:
    image: cache-invalidator:0.1.0
    build:
      context: ..
      dockerfile: services/invalidator/Dockerfile
    container_name: invalidator
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      register-debezium:
        condition: service_completed_successfully
    environment:
      INVALIDATOR_MGMT_PORT:    "8090"
      KAFKA_BOOTSTRAP_SERVERS:  "kafka:9092"
      KAFKA_TOPIC:              "cdc.catalog.items"
      KAFKA_GROUP:              "cache-invalidator"
      KAFKA_CONCURRENCY:        "${KAFKA_CONCURRENCY:-3}"
      REDIS_HOST:               "redis"
      REDIS_PORT:               "6379"
    ports:
      - "${INVALIDATOR_MGMT_HOST_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "/busybox/wget -qO- http://localhost:8090/actuator/health | /busybox/grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  # ─── Optional: stress generator (run with `--profile stress up`) ─
  stress:
    image: cache-stress:0.1.0
    build:
      context: ..
      dockerfile: tests/stress/Dockerfile
    container_name: stress
    profiles: ["stress"]
    depends_on:
      writer:
        condition: service_healthy
      reader:
        condition: service_healthy
      invalidator:
        condition: service_started
    command:
      - "--write-target=http://writer:8080"
      - "--read-target=http://reader:8081"
      - "--rps=${STRESS_RPS:-2000}"
      - "--duration=${STRESS_DURATION:-60s}"
      - "--workers=${STRESS_WORKERS:-32}"
      - "--keyspace=${STRESS_KEYSPACE:-10000}"
      - "--read-ratio=${STRESS_READ_RATIO:-0.8}"
      - "--update-ratio=${STRESS_UPDATE_RATIO:-0.1}"

volumes:
  mysql-data:
  redis-data:
  kafka-data:
