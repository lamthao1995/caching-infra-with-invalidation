# Plain-text Secret intended for *local / dev* clusters only. For staging/prod, replace
# this file with SealedSecrets, External Secrets Operator, or your cloud's secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "root"
  MYSQL_USER:          "app"
  MYSQL_PASSWORD:      "app"
  # The Debezium connector itself (running in Kafka Connect) reuses MYSQL_USER /
  # MYSQL_PASSWORD via the connector JSON in 17-debezium-connector.yaml. In prod you
  # would create a dedicated `cdc` user with REPLICATION SLAVE/CLIENT + SELECT only,
  # plumb it through Connect's FileConfigProvider, and keep app/app for the writer.
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
type: Opaque
stringData:
  REDIS_PASSWORD: ""
