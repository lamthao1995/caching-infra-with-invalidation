---
# Binlog config — the whole reason this MySQL exists. Debezium speaks the replica
# protocol, so we need ROW format + FULL row image (so the invalidator sees both
# before/after images and can pick the correct PK to delete from Redis) + GTIDs
# (so restarts can resume cleanly even after a binlog rotate).
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-conf
data:
  my.cnf: |
    [mysqld]
    server-id=1
    log-bin=mysql-bin
    binlog-format=ROW
    binlog-row-image=FULL
    binlog-row-metadata=FULL
    binlog-expire-logs-seconds=259200
    gtid-mode=ON
    enforce-gtid-consistency=ON
    max-connections=300
    skip-name-resolve=ON
---
# Schema + replication grants. The MySQL container runs every *.sql in /docker-entrypoint-initdb.d
# on first startup, so this only fires when the data PVC is fresh.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
data:
  01-schema.sql: |
    CREATE DATABASE IF NOT EXISTS catalog
      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;

    USE catalog;

    CREATE TABLE IF NOT EXISTS items (
      id           BIGINT       NOT NULL AUTO_INCREMENT PRIMARY KEY,
      name         VARCHAR(200) NOT NULL,
      description  VARCHAR(2000),
      price_cents  BIGINT       NOT NULL DEFAULT 0,
      currency     CHAR(3)      NOT NULL DEFAULT 'USD',
      stock        INT,
      created_at   TIMESTAMP    NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at   TIMESTAMP    NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      KEY idx_items_updated_at (updated_at)
    ) ENGINE=InnoDB;

    -- Permissions required by the binlog client (Debezium).
    -- See https://debezium.io/documentation/reference/connectors/mysql.html#setting-up-mysql
    GRANT SELECT, RELOAD, SHOW DATABASES,
          REPLICATION SLAVE, REPLICATION CLIENT, LOCK TABLES
      ON *.* TO 'app'@'%';
    GRANT ALL PRIVILEGES ON catalog.* TO 'app'@'%';
    FLUSH PRIVILEGES;
