---
# Headless Service so each StatefulSet pod gets a stable DNS name (kafka-0.kafka).
# The KRaft controller quorum talks to *.kafka:9093, brokers expose :9092.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app.kubernetes.io/name: kafka
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
---
# Single-broker KRaft cluster (broker + controller in the same pod). Sized for local
# dev / kind. For production: split broker / controller roles, set replicas >= 3, and
# raise the *_REPLICATION_FACTOR settings to match.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  labels:
    app.kubernetes.io/name: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          ports:
            - { name: broker,     containerPort: 9092 }
            - { name: controller, containerPort: 9093 }
          env:
            # ── KRaft topology ───────────────────────────────────────────
            - { name: KAFKA_NODE_ID,                  value: "1" }
            - { name: KAFKA_PROCESS_ROLES,            value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka-0.kafka:9093" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: CLUSTER_ID,                      value: "caching-infra-cluster-1" }

            # ── Listeners ────────────────────────────────────────────────
            - { name: KAFKA_LISTENERS,                 value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS,      value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }

            # ── Replication factors (single broker → must be 1) ─────────
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR,         value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR,            value: "1" }
            - { name: KAFKA_DEFAULT_REPLICATION_FACTOR,               value: "1" }
            - { name: KAFKA_MIN_INSYNC_REPLICAS,                      value: "1" }

            # ── Misc ─────────────────────────────────────────────────────
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE,    value: "true" }
            - { name: KAFKA_NUM_PARTITIONS,               value: "6" }
            - { name: KAFKA_LOG_RETENTION_HOURS,          value: "72" }
            - { name: KAFKA_LOG_DIRS,                     value: "/var/lib/kafka/data" }
          resources:
            requests: { cpu: "300m", memory: "768Mi" }
            limits:   { cpu: "1500m", memory: "1536Mi" }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 4
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 5Gi
