---
# Connector config TEMPLATE (just the inner "config" object). Credentials and other env
# values are injected at registration time by the Job below — same shape as
# deployments/connect/connector.json.
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-connector
data:
  connector.json: |
    {
      "connector.class":              "io.debezium.connector.mysql.MySqlConnector",
      "tasks.max":                    "1",

      "database.hostname":            "${MYSQL_HOST}",
      "database.port":                "${MYSQL_PORT}",
      "database.user":                "${CDC_USER}",
      "database.password":            "${CDC_PASSWORD}",
      "database.server.id":           "1002",

      "topic.prefix":                 "cdc",
      "database.include.list":        "${MYSQL_DATABASE}",
      "table.include.list":           "${MYSQL_DATABASE}.items",

      "schema.history.internal.kafka.bootstrap.servers": "${KAFKA_BOOTSTRAP_SERVERS}",
      "schema.history.internal.kafka.topic":             "cdc.schema-history.internal",

      "include.schema.changes":       "false",
      "snapshot.mode":                "initial",
      "snapshot.locking.mode":        "minimal",

      "key.converter":                "org.apache.kafka.connect.json.JsonConverter",
      "value.converter":              "org.apache.kafka.connect.json.JsonConverter",
      "key.converter.schemas.enable": "false",
      "value.converter.schemas.enable":"false",

      "topic.creation.default.replication.factor": "1",
      "topic.creation.default.partitions":         "6",
      "topic.creation.default.cleanup.policy":     "delete",
      "topic.creation.default.compression.type":   "lz4"
    }
---
# One-shot Job that registers (or updates) the connector via Kafka Connect's REST API.
# `PUT /connectors/<name>/config` is idempotent — re-running is safe and is how you'd
# push a config change in CI. We render the template with sed at submit time so MySQL
# credentials never leave the Secret.
apiVersion: batch/v1
kind: Job
metadata:
  name: register-debezium
  labels:
    app.kubernetes.io/name: register-debezium
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: register-debezium
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: curlimages/curl:8.10.1
          env:
            - name: MYSQL_HOST
              valueFrom: { configMapKeyRef: { name: app-env, key: MYSQL_HOST } }
            - name: MYSQL_PORT
              valueFrom: { configMapKeyRef: { name: app-env, key: MYSQL_PORT } }
            - name: MYSQL_DATABASE
              valueFrom: { configMapKeyRef: { name: app-env, key: MYSQL_DATABASE } }
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom: { configMapKeyRef: { name: app-env, key: KAFKA_BOOTSTRAP_SERVERS } }
            - name: CDC_USER
              valueFrom: { secretKeyRef: { name: db-credentials, key: MYSQL_USER } }
            - name: CDC_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: MYSQL_PASSWORD } }
          command:
            - sh
            - -c
            - |
              set -eu
              echo "waiting for kafka-connect:8083 ..."
              until curl -sf http://kafka-connect:8083/ >/dev/null; do
                sleep 3
              done
              echo "kafka-connect is up; registering connector ..."
              # Render ${VAR} placeholders from env. sed (not envsubst) because the
              # curlimages/curl alpine image doesn't bundle gettext.
              sed \
                -e "s|\${MYSQL_HOST}|${MYSQL_HOST}|g" \
                -e "s|\${MYSQL_PORT}|${MYSQL_PORT}|g" \
                -e "s|\${MYSQL_DATABASE}|${MYSQL_DATABASE}|g" \
                -e "s|\${CDC_USER}|${CDC_USER}|g" \
                -e "s|\${CDC_PASSWORD}|${CDC_PASSWORD}|g" \
                -e "s|\${KAFKA_BOOTSTRAP_SERVERS}|${KAFKA_BOOTSTRAP_SERVERS}|g" \
                /etc/connector/connector.json \
                | curl -sf -X PUT \
                    -H "Content-Type: application/json" \
                    --data @- \
                    http://kafka-connect:8083/connectors/mysql-catalog-items/config \
                | tee /dev/stderr
              echo
              echo "connector status:"
              curl -sf http://kafka-connect:8083/connectors/mysql-catalog-items/status \
                | tee /dev/stderr
              echo
          volumeMounts:
            - { name: connector, mountPath: /etc/connector }
      volumes:
        - name: connector
          configMap:
            name: debezium-connector
