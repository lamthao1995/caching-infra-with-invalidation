---
# Connector config (just the inner "config" object — Connect's PUT /connectors/.../config
# endpoint takes that subtree directly). Topic naming with `topic.prefix=cdc` produces:
#   data topic            : cdc.catalog.items
#   schema-history topic  : cdc.schema-history.internal     (managed by the connector)
# `database.server.id` MUST differ from MySQL's own server-id (1) and from any other
# binlog client.
#
# Same JSON shape as deployments/connect/connector.json so docker-compose and k8s share
# a single source of truth.
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-connector
data:
  connector.json: |
    {
      "connector.class":              "io.debezium.connector.mysql.MySqlConnector",
      "tasks.max":                    "1",

      "database.hostname":            "mysql",
      "database.port":                "3306",
      "database.user":                "app",
      "database.password":            "app",
      "database.server.id":           "1002",

      "topic.prefix":                 "cdc",
      "database.include.list":        "catalog",
      "table.include.list":           "catalog.items",

      "schema.history.internal.kafka.bootstrap.servers": "kafka:9092",
      "schema.history.internal.kafka.topic":             "cdc.schema-history.internal",

      "include.schema.changes":       "false",
      "snapshot.mode":                "initial",
      "snapshot.locking.mode":        "minimal",

      "key.converter":                "org.apache.kafka.connect.json.JsonConverter",
      "value.converter":              "org.apache.kafka.connect.json.JsonConverter",
      "key.converter.schemas.enable": "false",
      "value.converter.schemas.enable":"false",

      "topic.creation.default.replication.factor": "1",
      "topic.creation.default.partitions":         "6",
      "topic.creation.default.cleanup.policy":     "delete",
      "topic.creation.default.compression.type":   "lz4"
    }
---
# One-shot Job that registers (or updates) the connector via Kafka Connect's REST API.
# PUT /connectors/<name>/config is idempotent — re-running is safe and is how you'd push a
# config change in CI.
apiVersion: batch/v1
kind: Job
metadata:
  name: register-debezium
  labels:
    app.kubernetes.io/name: register-debezium
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: register-debezium
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              set -eu
              echo "waiting for kafka-connect:8083 ..."
              until curl -sf http://kafka-connect:8083/ >/dev/null; do
                sleep 3
              done
              echo "kafka-connect is up; registering connector ..."
              curl -sf -X PUT \
                -H "Content-Type: application/json" \
                --data "@/etc/connector/connector.json" \
                http://kafka-connect:8083/connectors/mysql-catalog-items/config | tee /dev/stderr
              echo
              echo "connector status:"
              curl -sf http://kafka-connect:8083/connectors/mysql-catalog-items/status | tee /dev/stderr
              echo
          volumeMounts:
            - { name: connector, mountPath: /etc/connector }
      volumes:
        - name: connector
          configMap:
            name: debezium-connector
