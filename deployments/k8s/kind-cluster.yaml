# Local kind cluster: 1 control plane + 2 workers, with the host's :80/:443 mapped to the
# control-plane node so an nginx-ingress installed in-cluster is reachable as
# http://writer.cache.local without any port-forwarding.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: caching-infra
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
